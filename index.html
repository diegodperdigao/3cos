<!-- SPLASH / INTRO — only rendered if user preference allows it -->
<script>
(function(){
  try{
    var pref=localStorage.getItem('3cos_show_intro');
    if(pref==='0') return;
    var raw=localStorage.getItem('3C_OS_DATA');
    if(raw){
      var s=JSON.parse(raw);
      if(s&&s.settings&&s.settings.showIntroVideo===false) return;
    }
  }catch(e){}
  document.write('<div id="splash" style="position:fixed;inset:0;z-index:9999;background:#000;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity 0.6s" onclick="skipIntro()"><video id="splash-video" autoplay muted playsinline webkit-playsinline="true" preload="auto" disablePictureInPicture style="width:100%;height:100%;object-fit:cover"><source src="assets/intro.mp4" type="video/mp4"></video></div>');
})();
function skipIntro(){
  const s=document.getElementById('splash');if(!s||s.style.opacity==='0')return;
  s.style.opacity='0';setTimeout(()=>s.remove(),600);
}
document.addEventListener('DOMContentLoaded',()=>{
  const v=document.getElementById('splash-video');
  if(!v)return;
  v.addEventListener('ended',skipIntro);
  // Force muted before play (iOS requirement) + try play explicitly
  v.muted=true;v.playsInline=true;
  var playPromise=v.play();
  if(playPromise&&playPromise.catch){
    playPromise.catch(function(){
      // Autoplay blocked (Low Power Mode, old iOS, etc) — skip splash right away
      setTimeout(skipIntro,100);
    });
  }
  // Hard ceiling: 8s no matter what
  setTimeout(skipIntro,8000);
});
</script>
