    ${heroHTML('users','Admin — Controle de Acesso','Usuários','Gerencie cargos, permissões e módulos por usuário')}
    <div class="mod-main">
      <div class="sec-hdr"><div class="sec-lbl">Usuários do sistema (${STATE.users.length})</div>
        <button class="btn btn-theme" onclick="openNewUser()"><i data-lucide="user-plus"></i>Novo Usuário</button></div>
      <div class="user-grid" id="user-grid"></div>
    </div></div>`;
  renderUsers();
}

function renderUsers(){
  const g=document.getElementById('user-grid');if(!g)return;
  const modLabels={dashboard:'Dashboard',affiliates:'Afiliados',casas:'Casas',payments:'Financeiro',tasks:'Tarefas',audit:'Auditoria',users:'Usuários'};
  g.innerHTML=STATE.users.map(u=>`
    <div class="user-card">
      <div class="user-av">${u.name[0]}</div>
      <div class="user-info">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">
          <div class="user-name">${u.name}</div>
          <span class="role-badge role-${u.role}">${ROLES[u.role]?.label||u.role}</span>
          ${u.status==='inativo'?'<span class="b b-encerrado">Inativo</span>':''}
        </div>
        <div class="user-email">${u.email}</div>
        <div class="user-mods">
          ${u.modules.map(m=>`<span class="mod-chip">${modLabels[m]||m}</span>`).join('')}
          ${u.role==='admin'&&!u.modules.includes('users')?'<span class="mod-chip" style="background:rgba(239,68,68,0.08);border-color:rgba(239,68,68,0.2);color:var(--red)">+Usuários</span>':''}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;flex-shrink:0">
        <button class="ibt" onclick="openEditUser('${u.id}')" title="Editar"><i data-lucide="edit-2" style="width:13px;height:13px"></i></button>
        <button class="ibt" onclick="toggleUserStatus('${u.id}')" title="${u.status==='ativo'?'Desativar':'Ativar'}"><i data-lucide="${u.status==='ativo'?'user-x':'user-check'}" style="width:13px;height:13px"></i></button>
        ${u.id!==STATE.user?.id?`<button class="ibt danger" onclick="confirmRemoveUser('${u.id}')" title="Remover"><i data-lucide="trash-2" style="width:13px;height:13px"></i></button>`:''}
      </div>
    </div>`).join('');
  lucide.createIcons();
}

window.openNewUser=()=>{
  openModal('Novo Usuário',`
    <div class="fg">
      <div class="fgp"><label>Nome completo *</label><input class="fi" id="nu-name" placeholder="Nome Sobrenome"></div>
      <div class="fgp"><label>Email *</label><input class="fi" id="nu-email" placeholder="email@3c.gg"></div>
      <div class="fgp"><label>Cargo</label><select class="fi" id="nu-role">
        ${Object.entries(ROLES).map(([k,r])=>`<option value="${k}">${r.label} — ${r.desc}</option>`).join('')}
      </select></div>
      <div class="fgp"><label>Status</label><select class="fi" id="nu-status">
        <option value="ativo">Ativo</option><option value="inativo">Inativo</option>
      </select></div>
      <div class="fgp ff">
        <label>Módulos disponíveis</label>
        <div class="mod-checks" id="nu-mods">
          ${ALL_MODS.map(m=>({dashboard:'Dashboard',affiliates:'Afiliados',casas:'Casas',payments:'Financeiro',tasks:'Tarefas',audit:'Auditoria',users:'Usuários'})[m]||m).map((label,i)=>`
            <label class="mod-check" onclick="this.classList.toggle('active')">
              <input type="checkbox" value="${ALL_MODS[i]}" id="nu-mod-${ALL_MODS[i]}" style="accent-color:var(--theme)"> <span>${label}</span>
            </label>`).join('')}
        </div>
      </div>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
     <button class="btn btn-theme" onclick="saveNewUser()"><i data-lucide="user-plus"></i>Criar Usuário</button>`);
  document.querySelectorAll('#nu-mods .mod-check').forEach(lbl=>{
    lbl.addEventListener('click',()=>{const cb=lbl.querySelector('input');cb.checked=!cb.checked;lbl.classList.toggle('active',cb.checked);});
  });
  lucide.createIcons();
};

window.saveNewUser=()=>{
  const name=document.getElementById('nu-name')?.value.trim();
  const email=document.getElementById('nu-email')?.value.trim();
  if(!name||!email){toast('Nome e email obrigatórios','e');return;}
  if(STATE.users.find(u=>u.email===email)){toast('Email já cadastrado','e');return;}
  const role=document.getElementById('nu-role')?.value||'viewer';
  const status=document.getElementById('nu-status')?.value||'ativo';
  const modules=[...document.querySelectorAll('#nu-mods input:checked')].map(i=>i.value);
  const newUser={id:'u'+Date.now(),name,email,role,status,modules,createdAt:new Date().toISOString().split('T')[0]};
  STATE.users.push(newUser);
  logAction('Usuário criado',`${name} <${email}> — ${ROLES[role]?.label}`);
  closeModal();renderUsers();toast(`Usuário ${name} criado!`);
};

window.openEditUser=id=>{
  const u=STATE.users.find(x=>x.id===id);if(!u)return;
  openModal(`Editar — ${u.name}`,`
    <div class="fg">
      <div class="fgp"><label>Nome</label><input class="fi" id="eu-name" value="${u.name}"></div>
      <div class="fgp"><label>Email</label><input class="fi" id="eu-email" value="${u.email}"></div>
      <div class="fgp"><label>Cargo</label><select class="fi" id="eu-role">
        ${Object.entries(ROLES).map(([k,r])=>`<option value="${k}" ${u.role===k?'selected':''}>${r.label} — ${r.desc}</option>`).join('')}
      </select></div>
      <div class="fgp"><label>Status</label><select class="fi" id="eu-status">
        <option value="ativo" ${u.status==='ativo'?'selected':''}>Ativo</option>
        <option value="inativo" ${u.status==='inativo'?'selected':''}>Inativo</option>
      </select></div>
      <div class="fgp ff">
        <label>Módulos disponíveis</label>
        <div class="mod-checks" id="eu-mods">
          ${ALL_MODS.map((m,i)=>{
            const label=({dashboard:'Dashboard',affiliates:'Afiliados',casas:'Casas',payments:'Financeiro',tasks:'Tarefas',audit:'Auditoria',users:'Usuários'})[m]||m;
            const checked=u.modules.includes(m);
            return `<label class="mod-check ${checked?'active':''}" onclick="this.classList.toggle('active')">
              <input type="checkbox" value="${m}" id="eu-mod-${m}" ${checked?'checked':''} style="accent-color:var(--theme)"> <span>${label}</span></label>`;
          }).join('')}
        </div>
      </div>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
     <button class="btn btn-danger" onclick="confirmRemoveUser('${id}')"><i data-lucide="trash-2"></i>Remover</button>
     <button class="btn btn-theme" onclick="saveEditUser('${id}')"><i data-lucide="save"></i>Salvar</button>`);
  document.querySelectorAll('#eu-mods .mod-check').forEach(lbl=>{
    lbl.addEventListener('click',()=>{const cb=lbl.querySelector('input');cb.checked=!cb.checked;lbl.classList.toggle('active',cb.checked);});
  });
  lucide.createIcons();
};

window.saveEditUser=id=>{
  const u=STATE.users.find(x=>x.id===id);if(!u)return;
  u.name=document.getElementById('eu-name')?.value.trim()||u.name;
  u.email=document.getElementById('eu-email')?.value.trim()||u.email;
  u.role=document.getElementById('eu-role')?.value||u.role;
  u.status=document.getElementById('eu-status')?.value||u.status;
  u.modules=[...document.querySelectorAll('#eu-mods input:checked')].map(i=>i.value);
  logAction('Usuário editado',`${u.name} — cargo: ${ROLES[u.role]?.label} — módulos: ${u.modules.join(', ')}`);
  closeModal();renderUsers();toast('Usuário atualizado!');
};

window.toggleUserStatus=id=>{
  const u=STATE.users.find(x=>x.id===id);if(!u)return;
  u.status=u.status==='ativo'?'inativo':'ativo';
  logAction(`Usuário ${u.status==='ativo'?'ativado':'desativado'}`,u.name);
  renderUsers();toast(u.status==='ativo'?'Usuário ativado!':'Usuário desativado!',u.status==='ativo'?'s':'w');
};

window.confirmRemoveUser=id=>{
  const u=STATE.users.find(x=>x.id===id);if(!u)return;
  openModal('Confirmar Remoção',`
    <div style="text-align:center;padding:8px 0 16px">
      <div style="width:52px;height:52px;border-radius:50%;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
        <i data-lucide="trash-2" style="width:22px;height:22px;stroke:var(--red)"></i>
      </div>
      <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px">${u.name}</div>
      <div style="font-size:12px;color:var(--text2)">${u.email}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:12px">Esta ação não pode ser desfeita.</div>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
     <button class="btn btn-danger" onclick="removeUser('${id}')"><i data-lucide="trash-2"></i>Remover definitivamente</button>`);
  lucide.createIcons();
};

window.removeUser=id=>{
  const u=STATE.users.find(x=>x.id===id);if(!u)return;
  if(id===STATE.user?.id){toast('Não é possível remover seu próprio usuário','e');closeModal();return;}
  STATE.users=STATE.users.filter(x=>x.id!==id);
  logAction('Usuário removido',`${u.name} <${u.email}>`);
  closeModal();renderUsers();toast(`${u.name} removido`,'w');
};

</script>
</body>
</html>
