<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#030008">
<title>3C OS Pro</title>
<link rel="icon" href="https://i.ibb.co/TDvNpKbv/285535120-111261434935979-5560566145880188190-n.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<!-- EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

<!-- SPLASH / INTRO -->
<div id="splash" style="position:fixed;inset:0;z-index:9999;background:#000;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity 0.6s" onclick="skipIntro()">
  <video id="splash-video" autoplay muted playsinline style="width:100%;height:100%;object-fit:cover">
    <source src="assets/intro.mp4" type="video/mp4">
  </video>
</div>
<script>
function skipIntro(){
  const s=document.getElementById('splash');if(!s||s.style.opacity==='0')return;
  s.style.opacity='0';setTimeout(()=>s.remove(),600);
}
document.addEventListener('DOMContentLoaded',()=>{
  const v=document.getElementById('splash-video');
  if(v){v.addEventListener('ended',skipIntro);
    // Fallback: remove after 8s max
    setTimeout(skipIntro,8000);
  }
});
</script>

<!-- MOBILE SIDEBAR -->
<div id="mob-sidebar-overlay" onclick="closeMobSidebar()"></div>
<div id="mob-sidebar">
  <div class="mob-sb-hdr">
    <img src="https://i.ibb.co/TDvNpKbv/285535120-111261434935979-5560566145880188190-n.jpg" class="mob-sb-logo">
    <div class="mob-sb-brand">3C<em>OS</em></div>
    <button class="mob-sb-close" onclick="closeMobSidebar()"><i data-lucide="x" style="width:18px;height:18px"></i></button>
  </div>
  <div class="mob-sb-user" id="mob-sb-user"></div>
  <div class="mob-sb-nav" id="mob-sb-nav"></div>
  <div class="mob-sb-footer">
    <button class="mob-sb-footer-btn" onclick="closeMobSidebar();toggleTheme()"><i data-lucide="sun" id="mob-theme-icon"></i> Tema</button>
    <button class="mob-sb-footer-btn" onclick="closeMobSidebar();toggleActionCenter()"><i data-lucide="bell"></i> Alertas</button>
    <button class="mob-sb-footer-btn danger" onclick="closeMobSidebar();doLogout()"><i data-lucide="log-out"></i> Sair</button>
  </div>
</div>

<!-- LOCK -->
<div id="lock" style="display:none">
  <div class="mosaic-wrapper"><div class="mosaic-container"><div class="mosaic-pattern" id="lock-mosaic"></div></div></div>
  <div class="lock-box">
    <img src="https://i.ibb.co/TDvNpKbv/285535120-111261434935979-5560566145880188190-n.jpg" class="lock-logo">
    <div class="lock-title">3C<span>OS</span></div>
    <div class="lock-sub">Sistema Operacional — Pro</div>
    <input type="email" id="le" class="lock-field" placeholder="nome@3c.gg" autocomplete="email" onkeydown="if(event.key==='Enter') doLogin()">
    <input type="password" id="lp" class="lock-field" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter') doLogin()">
    <button class="lock-btn" id="lbtn" onclick="doLogin()">ACESSAR O SISTEMA</button>
    <div class="lock-hint">Acesso seguro via Firebase Auth</div>
    <div id="lerr" class="lock-err"></div>
    <div class="lock-reset" onclick="toast('Email enviado!','i')">Esqueci minha senha</div>
    <button onclick="toggleTheme()" style="margin-top:16px;background:transparent;border:none;cursor:pointer;color:var(--text3);transition:color 0.15s;padding:8px" title="Alternar tema">
      <i data-lucide="sun" style="width:18px;height:18px"></i>
    </button>
  </div>
</div>

<!-- HUB -->
<div id="hub" style="display:none;flex-direction:column">
  <div class="hub-bg">
    <div class="mosaic-wrapper"><div class="mosaic-container"><div class="mosaic-pattern" id="hub-mosaic"></div></div></div>
    <div class="hub-overlay"></div>
  </div>
  <div class="hub-bar">
    <button class="hub-hamburger" onclick="openMobSidebar()"><i data-lucide="menu"></i></button>
    <div class="hub-logo-row">
      <img src="https://i.ibb.co/TDvNpKbv/285535120-111261434935979-5560566145880188190-n.jpg" class="hub-logo-img">
      <div class="hub-wordmark">3C<em>OS</em></div>
    </div>
    <div class="hub-bar-r">
      <button class="hub-icon-btn hub-lab-btn" onclick="toggleBetaMode()" id="hub-lab-btn" title="Modo Beta — clique para ativar recursos experimentais">
        <i data-lucide="zap"></i>
      </button>
      <button class="hub-icon-btn" onclick="toggleActionCenter()" id="hub-notif-btn">
        <i data-lucide="bell"></i>
        <div class="hub-notif-badge" id="hub-notif-count" style="display:none">0</div>
      </button>
      <button class="hub-icon-btn" onclick="toggleTheme()"><i data-lucide="sun" id="theme-icon"></i></button>
      <div style="text-align:right; margin-left: 8px;">
        <div class="hub-user-name" id="hub-uname">—</div>
        <span class="hub-user-role" id="hub-urole">Admin</span>
      </div>
      <button class="hub-logout-btn" style="margin-left: 8px;" onclick="doLogout()">SAIR</button>
    </div>
  </div>
  
  <div class="hub-main">
    <div class="hub-identity">
      <img src="https://i.ibb.co/TDvNpKbv/285535120-111261434935979-5560566145880188190-n.jpg" class="hub-id-logo">
      <div class="hub-id-name">3C<span>OS</span></div>
      <div class="hub-id-tagline">CRM & Gestão</div>
      <div class="hub-greeting" id="hub-greeting">Selecione o módulo de trabalho</div>
    </div>
    <div class="hub-apps-label hub-desktop-only">Módulos disponíveis</div>
    <div class="hub-apps hub-desktop-only" id="hub-cards"></div>
    <!-- Mobile Home: Tasks + Notifications -->
    <div class="hub-mobile-home" id="hub-mobile-home"></div>
  </div>
</div>

<!-- MODULES -->
<div class="mod" id="mod-dashboard"></div>
<div class="mod" id="mod-affiliates"></div>
<div class="mod" id="mod-brands"></div>
<div class="mod" id="mod-payments"></div>
<div class="mod" id="mod-tasks"></div>
<div class="mod" id="mod-pipeline"></div>
<div class="mod" id="mod-audit"></div>
<div class="mod" id="mod-backup"></div>
<div class="mod" id="mod-users"></div>

<!-- ACTION CENTER (Barra Lateral Direita) -->
<div id="ac-overlay" onclick="toggleActionCenter()"></div>
<div id="action-center">
  <div class="ac-hdr">
    <span class="ac-title"><i data-lucide="inbox"></i> Central de Ações</span>
    <button class="ac-close" onclick="toggleActionCenter()"><i data-lucide="x" style="width:18px;height:18px"></i></button>
  </div>
  <div class="ac-body" id="ac-body-content"></div>
</div>

<!-- MODAL -->
<div id="modal-ov" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-ttl" id="mttl"></span>
      <button class="modal-cls" onclick="closeModal()"><i data-lucide="x"></i></button>
    </div>
    <div class="modal-bd" id="mbd"></div>
    <div class="modal-ft" id="mft"></div>
  </div>
</div>
<div id="toasts"></div>

<!-- MOBILE BOTTOM NAV -->
<div class="mob-bottom-nav" id="mob-bottom-nav">
  <div class="mob-bnav-item" onclick="goBack()"><i data-lucide="grid"></i><span>Hub</span></div>
  <div class="mob-bnav-item" onclick="openMod('dashboard')"><i data-lucide="bar-chart-2"></i><span>Dash</span></div>
  <div class="mob-bnav-item" onclick="openMod('affiliates')"><i data-lucide="users"></i><span>Afiliados</span></div>
  <div class="mob-bnav-item" onclick="openMod('pipeline')"><i data-lucide="git-branch"></i><span>Pipeline</span></div>
  <div class="mob-bnav-item" onclick="openMod('payments')"><i data-lucide="banknote"></i><span>Financ.</span></div>
</div>

<!-- Core: Firebase, Auth, State, Utils, Navigation -->
<script src="js/app.js"></script>
<!-- Lab (feature flag system) -->
<script src="js/lab.js"></script>
<!-- Modules -->
<script src="js/dashboard.js"></script>
<script src="js/affiliates.js"></script>
<script src="js/brands.js"></script>
<script src="js/payments.js"></script>
<script src="js/tasks.js"></script>
<script src="js/pipeline.js"></script>
<script src="js/import.js"></script>
<script src="js/watchdog.js"></script>
<script src="js/audit.js"></script>
<script src="js/users.js"></script>
</body>
</html>
